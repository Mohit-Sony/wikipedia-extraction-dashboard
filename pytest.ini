[pytest]
# Pytest configuration for Wikipedia Dashboard

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: Integration tests that make real API calls (slow, run sparingly)
    unit: Unit tests (fast, no external dependencies)
    slow: Slow running tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (if pytest-cov is installed)
# addopts = -v --cov=Python_Helper/wikidata --cov-report=html --cov-report=term

# Test paths
testpaths = tests

# Ignore patterns
norecursedirs = .git .tox dist build *.egg venv .bmad-core

# Minimum Python version
minversion = 3.8
